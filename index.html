<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Fútbol Presidente - Oficina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- BARRA SUPERIOR DE ESTADO -->
        <header>
            <h1>Futbol Presidente</h1>
            <div id="stats-bar">
                <div>Club: <span id="club-nombre">-</span></div>
                <div>Presupuesto: <span id="club-dinero">$0</span></div>
                <div>Semana: <span id="juego-semana">1</span></div>
            </div>
        </header>

        <!-- PANEL PRINCIPAL -->
        <main>
            <section id="oficina">
                <h2>Oficina de Gestión</h2>
                <p>Gestiona tu plantilla antes de avanzar al siguiente encuentro oficial.</p>
                <button id="btn-avanzar" onclick="avanzarSemana()">⚽ Jugar Partido y Avanzar</button>
                
                <div class="tarjeta">
                    <h3>📋 Plantilla Actual</h3>
                    <ul id="lista-jugadores"></ul>
                </div>
            </section>
        </main>
    </div>
    <script src="game.js"></script>
</body>
</html>
